<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test backend – Auth n8n</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        /* Style minimaliste, fond sombre léger */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; text-align: center; }
        label { display: block; margin: 0.8rem 0 0.3rem; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #0f3460;
            color: white;
            font-size: 1rem;
        }
        input:focus { border-color: #e94560; outline: none; }
        button {
            width: 100%;
            padding: 0.8rem;
            margin-top: 1.2rem;
            background: #e94560;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #ff6b6b; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.3rem; display: none; }
        .link {
            color: #e94560;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-block;
            margin-top: 0.8rem;
        }
        .link:hover { text-decoration: underline; }
        .hidden { display: none; }
        .code-inputs {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1rem 0;
        }
        .code-inputs input {
            width: 3rem;
            text-align: center;
            font-size: 1.5rem;
            padding: 0.5rem;
        }
        #card-element {
            background: #0f3460;
            padding: 0.8rem;
            border-radius: 6px;
            margin: 1rem 0;
        }
        .stripe-badge {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            margin-top: 0.5rem;
        }
        .toast {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            z-index: 999;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ÉTAT CONNEXION -->
        <div id="step-login">
            <h2>Connexion</h2>
            <label>Email</label>
            <input type="email" id="login-email" placeholder="vous@exemple.com">
            <div class="error" id="login-email-error"></div>
            <label>Mot de passe</label>
            <input type="password" id="login-password" placeholder="••••••••">
            <div class="error" id="login-password-error"></div>
            <button id="login-btn">Se connecter</button>
            <a class="link" id="go-register">Créer un compte</a>
        </div>

        <!-- ÉTAT INSCRIPTION -->
        <div id="step-register" class="hidden">
            <h2>Créer un compte</h2>
            <label>Nom d'utilisateur</label>
            <input type="text" id="reg-username" placeholder="jean.dupont">
            <div class="error" id="reg-username-error"></div>
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="vous@exemple.com">
            <div class="error" id="reg-email-error"></div>
            <label>Mot de passe</label>
            <input type="password" id="reg-password" placeholder="8 caractères min.">
            <div class="error" id="reg-password-error"></div>
            <button id="register-btn">Envoyer le code</button>
            <a class="link" id="go-login">Déjà un compte ? Se connecter</a>
        </div>

        <!-- ÉTAT VÉRIFICATION -->
        <div id="step-verify" class="hidden">
            <h2>Vérification email</h2>
            <p style="text-align:center;font-size:0.9rem;" id="verify-info"></p>
            <div class="code-inputs" id="code-container">
                <input type="text" maxlength="1" class="code-digit" data-index="0" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="code-digit" data-index="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="code-digit" data-index="2" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="code-digit" data-index="3" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="code-digit" data-index="4" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="code-digit" data-index="5" inputmode="numeric" pattern="[0-9]">
            </div>
            <div class="error" id="verify-code-error"></div>
            <button id="verify-btn">Vérifier le code</button>
            <a class="link" id="resend-code">Renvoyer le code</a><br>
            <a class="link" id="back-register">← Modifier mes informations</a>
        </div>

        <!-- ÉTAT PAIEMENT -->
        <div id="step-payment" class="hidden">
            <h2>Paiement (29€/mois)</h2>
            <div id="card-element"></div>
            <div class="error" id="card-error"></div>
            <button id="payment-btn">Payer 29€</button>
            <div class="stripe-badge">🔒 Paiement sécurisé Stripe</div>
            <a class="link" id="back-verify">← Retour</a>
        </div>

        <!-- ÉTAT SUCCÈS -->
        <div id="step-success" class="hidden">
            <h2>🎉 Inscription réussie !</h2>
            <p style="text-align:center;">Votre compte a été créé. Redirection vers le tableau de bord...</p>
            <button id="dashboard-btn">Aller au tableau de bord</button>
        </div>
    </div>
    <script>
        // ⚠️ Remplacez par votre clé publique Stripe (test ou live)
        const STRIPE_KEY = 'pk_test_51RBfArKd8Y7mN3xLq2pZwVcT0aB1nC4dE5fG6hI7jK8lM9oP0qRsTuVwXyZaBcDeFgHiJkLmNoPqRsTuVwXyZ';
        const stripe = Stripe(STRIPE_KEY);
        const elements = stripe.elements();
        let cardElement = null;

        // ------ VARIABLES GLOBALES ------
        let currentEmail = '';
        let currentUsername = '';

        // ------ DOM ELEMENTS ------
        const steps = {
            login: document.getElementById('step-login'),
            register: document.getElementById('step-register'),
            verify: document.getElementById('step-verify'),
            payment: document.getElementById('step-payment'),
            success: document.getElementById('step-success')
        };

        function showStep(step) {
            Object.values(steps).forEach(el => el.classList.add('hidden'));
            steps[step].classList.remove('hidden');
        }

        // ------ FONCTIONS UTILITAIRES ------
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function setError(id, msg) {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = msg;
                el.style.display = 'block';
            }
        }

        function clearErrors() {
            document.querySelectorAll('.error').forEach(e => { e.textContent = ''; e.style.display = 'none'; });
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ------ APPELS API ------
        async function apiCall(url, data) {
        const token = localStorage.getItem('auth_token');
        const headers = {'Content-Type': 'application/json'};
        if (token) { headers['Authorization'] = `Bearer ${token}`;}
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    credentials: 'include',
                    headers: headers,
                    body: JSON.stringify(data)
                });
                const json = await res.json();
                if (!res.ok) throw new Error(json.message || `Erreur ${res.status}`);
                return { success: true, data: json };
            } catch (err) {
                return { success: false, error: err.message };
            }
        }

        // ------ GESTION DU CODE À 6 CHIFFRES ------
        function setupCodeInputs() {
            const inputs = document.querySelectorAll('.code-digit');
            inputs.forEach((input, idx) => {
                input.addEventListener('input', (e) => {
                    const val = e.target.value.replace(/\D/g, '');
                    e.target.value = val.slice(0, 1);
                    if (val && idx < 5) inputs[idx + 1].focus();
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && idx > 0) {
                        inputs[idx - 1].focus();
                    }
                });
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const paste = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
                    [...paste].forEach((digit, i) => {
                        if (inputs[i]) inputs[i].value = digit;
                    });
                    const focusIdx = Math.min(paste.length, 5);
                    inputs[focusIdx].focus();
                });
            });
        }

        function getCode() {
            return Array.from(document.querySelectorAll('.code-digit')).map(inp => inp.value).join('');
        }

        function resetCodeInputs() {
            document.querySelectorAll('.code-digit').forEach(inp => inp.value = '');
            document.getElementById('verify-code-error').style.display = 'none';
        }

        // ------ NAVIGATION ------
        document.getElementById('go-register').addEventListener('click', () => {
            clearErrors();
            document.getElementById('reg-username').value = '';
            document.getElementById('reg-email').value = '';
            document.getElementById('reg-password').value = '';
            showStep('register');
        });

        document.getElementById('go-login').addEventListener('click', () => {
            clearErrors();
            showStep('login');
        });

        document.getElementById('back-register').addEventListener('click', () => {
            clearErrors();
            document.getElementById('reg-username').value = currentUsername;
            document.getElementById('reg-email').value = currentEmail;
            showStep('register');
        });

        document.getElementById('back-verify').addEventListener('click', () => {
            clearErrors();
            resetCodeInputs();
            showStep('verify');
        });

        document.getElementById('resend-code').addEventListener('click', async () => {
            await apiCall('SendEmail', {
                email: document.getElementById('login-email').value.trim(),
            });
            showToast('Nouveau code envoyé');
            resetCodeInputs();
            document.querySelector('.code-digit[data-index="0"]').focus();
        });

        // ------ ACTION: CONNEXION ------
        document.getElementById('login-btn').addEventListener('click', async () => {
            clearErrors();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            let valid = true;
            if (!email || !isValidEmail(email)) {
                setError('login-email-error', 'Email invalide');
                valid = false;
            }
            if (!password) {
                setError('login-password-error', 'Mot de passe requis');
                valid = false;
            }
            if (!valid) return;

            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Connexion...';
            const res = await apiCall('Login', { email, password });
            btn.disabled = false;
            btn.textContent = 'Se connecter';

            if (res.success) {
                if (res.data.token) {
                    localStorage.setItem('auth_token', res.data.token);
                }
            } else {
                showToast(res.error || 'Échec de la connexion');
            }
        });

        // ------ ACTION: INSCRIPTION (envoi code) ------
        document.getElementById('register-btn').addEventListener('click', async () => {
            clearErrors();
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            let valid = true;
            if (!username || username.length < 3) {
                setError('reg-username-error', 'Nom utilisateur trop court (min 3)');
                valid = false;
            }
            if (!email || !isValidEmail(email)) {
                setError('reg-email-error', 'Email invalide');
                valid = false;
            }
            if (!password || password.length < 8) {
                setError('reg-password-error', 'Mot de passe trop court (min 8)');
                valid = false;
            }
            if (!valid) return;

            currentEmail = email;
            currentUsername = username;

            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.textContent = 'Envoi du code...';
            const res = await apiCall('SendEmail', {email: email});
            btn.disabled = false;
            btn.textContent = 'Envoyer le code';

            if (res.success) {
                document.getElementById('verify-info').innerHTML = `Code envoyé à <strong>${email}</strong>`;
                resetCodeInputs();
                showStep('verify');
                setTimeout(() => document.querySelector('.code-digit[data-index="0"]').focus(), 100);
            } else {
                showToast(res.error || 'Erreur envoi code');
            }
        });

        // ------ ACTION: VÉRIFICATION CODE ------
        document.getElementById('verify-btn').addEventListener('click', async () => {
            clearErrors();
            const code = getCode();
            if (code.length !== 6 || !/^\d{6}$/.test(code)) {
                setError('verify-code-error', 'Entrez les 6 chiffres');
                return;
            }

            const btn = document.getElementById('verify-btn');
            btn.disabled = true;
            btn.textContent = 'Vérification...';
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const res = await apiCall('CheckEmail', { email: email, username: username, password: password, code: code });
            btn.disabled = false;
            btn.textContent = 'Vérifier le code';

            if (res.success) {
                window.location.href = '/my-youtube';
                // Montage Stripe lors du passage au paiement
                if (!cardElement) {
                    cardElement = elements.create('card', {
                        style: {
                            base: {
                                fontSize: '16px',
                                color: '#ffffff',
                                '::placeholder': { color: '#aab7c4' }
                            }
                        }
                    });
                    cardElement.mount('#card-element');
                    cardElement.on('change', (event) => {
                        const displayError = document.getElementById('card-error');
                        if (event.error) {
                            displayError.textContent = event.error.message;
                            displayError.style.display = 'block';
                        } else {
                            displayError.textContent = '';
                            displayError.style.display = 'none';
                        }
                    });
                }
                showStep('payment');
                showToast('Email vérifié !');
            } else {
                setError('verify-code-error', res.error || 'Code incorrect');
                resetCodeInputs();
                document.querySelector('.code-digit[data-index="0"]').focus();
            }
        });

        // ------ ACTION: PAIEMENT ------
        document.getElementById('payment-btn').addEventListener('click', async () => {
            const btn = document.getElementById('payment-btn');
            const errorEl = document.getElementById('card-error');
            btn.disabled = true;
            btn.textContent = 'Paiement en cours...';

            // Création du PaymentMethod via Stripe
            const { error, paymentMethod } = await stripe.createPaymentMethod({
                type: 'card',
                card: cardElement,
            });

            if (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Payer 29€';
                return;
            }

            // Envoi au backend
            const res = await apiCall('ProcessPayment', {
                email: currentEmail,
                username: currentUsername,
                paymentMethodId: paymentMethod.id,
                plan: 'pro',
                amount: 2900
            });

            if (res.success) {
                showToast('Paiement accepté !');
                showStep('success');
            } else {
                errorEl.textContent = res.error || 'Échec du paiement';
                errorEl.style.display = 'block';
            }
            btn.disabled = false;
            btn.textContent = 'Payer 29€';
        });

        // ------ REDIRECTION FINALE ------
        document.getElementById('dashboard-btn').addEventListener('click', () => {
            window.location.href = '/dashboard';
        });

        // ------ INIT ------
        setupCodeInputs();
        showStep('login');

        console.log('✅ Testeur backend prêt. Endpoints attendus : /SendEmail, /CheckEmail, /ProcessPayment, /Login');
    </script>
</body>
</html>
