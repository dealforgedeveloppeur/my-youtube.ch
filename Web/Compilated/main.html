<!DOCTYPE html>
<html lang="fr">
<head>
    <script>async function checkTokenAndPost() {if (localStorage.getItem('auth_token')){const token = localStorage.getItem('auth_token');const res = await fetch('IsConnected', {method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`}});const json = await res.json();if (res.ok) {window.location.href='/my-youtube/dashboard';} else {if (localStorage.getItem('seen_token')){window.location.href='/my-youtube/login';}}} checkTokenAndPost();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My YouTube - Présentation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .hero {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            background: #16213e;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #fff;
        }
        h1 span {
            color: #e94560;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 2rem;
        }
        .cta-box {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: #e94560;
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background: #ff6b6b;
        }
        .btn-secondary {
            background: transparent;
            color: #eee;
            border: 2px solid #0f3460;
        }
        .btn-secondary:hover {
            background: #0f3460;
            color: white;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Bienvenue sur <span>My YouTube</span></h1>
        <p>
            Découvrez une toute nouvelle façon d'interagir avec vos contenus favoris.
            Regroupez vos créateurs, organisez vos listes de visionnage et profitez
            d'une interface fluide conçue pour les passionnés.
        </p>
        <div class="cta-box">
            <a href="/my-youtube/login" class="btn btn-primary">Se connecter</a>
            <a href="/my-youtube/login" class="btn btn-secondary">Créer un compte</a>
        </div>
    </div>
</body>
</html>
